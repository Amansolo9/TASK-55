<section class="grid gap-6 md:grid-cols-2">
  <div class="bg-white rounded-xl border p-4">
    <h2 class="font-semibold mb-3">Create Budget</h2>
    <form class="grid gap-2" hx-post="/api/budgets" hx-target="#budget-result" hx-swap="innerHTML" hx-disabled-elt="button[type='submit']" hx-on::after-request="if(event.detail.successful) this.reset()">
      {{if and .User (eq .User.Role "admin")}}
      <label class="text-sm font-medium">Club</label>
      <select name="club_id" class="border rounded px-2 py-1" required>
        <option value="">Select club</option>
        {{range .Clubs}}
        <option value="{{.ID}}">{{.Name}}</option>
        {{end}}
      </select>
      {{end}}
      <input name="account_code" class="border rounded px-2 py-1" placeholder="Account code" required />
      <input name="campus_code" class="border rounded px-2 py-1" placeholder="Campus code" required />
      <input name="project_code" class="border rounded px-2 py-1" placeholder="Project code" required />
      <select name="period_type" class="border rounded px-2 py-1"><option>monthly</option><option>quarterly</option></select>
      <input name="period_start" class="border rounded px-2 py-1" placeholder="2026-03" required />
      <input name="amount" class="border rounded px-2 py-1" type="number" step="0.01" placeholder="1000" required />
      <button class="bg-slate-900 text-white rounded px-3 py-2">Save</button>
    </form>
    <div id="budget-result" class="text-sm mt-2 text-slate-700"></div>
  </div>

  <div class="bg-white rounded-xl border p-4">
    <h2 class="font-semibold mb-3">Request Budget Change</h2>
    <form class="grid gap-2" hx-post="/api/budgets/1/change" hx-target="#budget-change-result" hx-disabled-elt="button[type='submit']" hx-on:submit="this.setAttribute('hx-post','/api/budgets/' + this.querySelector('[name=budget_id]').value + '/change')">
      <input name="budget_id" class="border rounded px-2 py-1" placeholder="Budget ID" required />
      <input name="proposed_amount" class="border rounded px-2 py-1" type="number" step="0.01" placeholder="Proposed amount" required />
      <input name="reason" class="border rounded px-2 py-1" placeholder="Reason for change" required />
      <button class="bg-amber-700 text-white rounded px-3 py-2">Submit Change</button>
    </form>
    <div id="budget-change-result" class="text-sm mt-2 text-slate-700"></div>
  </div>

  <div class="bg-white rounded-xl border p-4">
    <h2 class="font-semibold mb-3">Budget Projection</h2>
    <form class="grid gap-2" hx-get="/api/budgets/1/projection" hx-target="#projection-result" hx-disabled-elt="button[type='submit']" hx-on:submit="this.setAttribute('hx-get','/api/budgets/' + this.querySelector('[name=budget_id]').value + '/projection')">
      <input name="budget_id" class="border rounded px-2 py-1" placeholder="Budget ID" required />
      <input name="expected_remaining_spend" class="border rounded px-2 py-1" type="number" step="0.01" placeholder="Expected remaining spend" />
      <button class="bg-sky-700 text-white rounded px-3 py-2">Preview Projection</button>
    </form>
    <div id="projection-result" class="text-sm mt-2 text-slate-700"></div>
  </div>

  <div class="bg-white rounded-xl border p-4">
    <h2 class="font-semibold mb-3">Record Spend</h2>
    <form class="grid gap-2" hx-post="/api/budgets/1/spend" hx-target="#spend-result" hx-disabled-elt="button[type='submit']" hx-on:submit="this.setAttribute('hx-post','/api/budgets/' + this.querySelector('[name=budget_id]').value + '/spend')">
      <input name="budget_id" class="border rounded px-2 py-1" placeholder="Budget ID" required />
      <input name="spent" class="border rounded px-2 py-1" type="number" step="0.01" placeholder="Current spent total" required />
      <button class="bg-emerald-700 text-white rounded px-3 py-2">Update Spend</button>
    </form>
    <div id="spend-result" class="text-sm mt-2 text-slate-700"></div>
  </div>

  <div class="bg-white rounded-xl border p-4">
    <h2 class="font-semibold mb-3">Pending >10% Changes</h2>
    <div id="pending-changes"
         hx-get="/partials/budgets/changes"
         hx-trigger="load, budgetsUpdated from:body"
         hx-swap="innerHTML">Loading...</div>
  </div>

  <div class="md:col-span-2 bg-white rounded-xl border p-4">
    <h2 class="font-semibold mb-3">Budgets</h2>
    <div id="budgets-list"
         hx-get="/partials/budgets/list"
         hx-trigger="load, budgetsUpdated from:body"
         hx-swap="innerHTML">Loading...</div>
  </div>
</section>
