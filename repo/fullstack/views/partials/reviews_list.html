<ul class="space-y-2 text-sm">
  {{range .Reviews}}
  <li class="border rounded p-2 flex justify-between items-center gap-2">
    <span>#{{.ID}} {{.Stars}}/5 - {{.AppealStatus}}</span>
    <div class="flex gap-2">
      <button hx-post="/api/reviews/{{.ID}}/appeal" hx-target="#review-result" class="text-amber-700">Appeal</button>
      {{if or (eq $.User.Role "admin") (eq $.User.Role "organizer")}}
        <form class="flex items-center gap-2" hx-post="/api/reviews/{{.ID}}/moderate" hx-target="#review-result">
          <input type="hidden" name="decision" value="hide" />
          <input name="reason" class="border rounded px-2 py-1" placeholder="Hide reason" required />
          <button class="text-red-700">Hide</button>
        </form>
        <form class="flex items-center gap-2" hx-post="/api/reviews/{{.ID}}/moderate" hx-target="#review-result">
          <input type="hidden" name="decision" value="reinstate" />
          <input name="reason" class="border rounded px-2 py-1" placeholder="Reinstate reason" required />
          <button class="text-emerald-700">Reinstate</button>
        </form>
      {{end}}
    </div>
  </li>
  {{else}}
  <li>No reviews submitted.</li>
  {{end}}
</ul>
