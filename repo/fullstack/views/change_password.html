<section class="max-w-md mx-auto bg-white rounded-xl border p-6 space-y-4">
  <h1 class="text-xl font-semibold">Change Password</h1>
  <p class="text-sm text-slate-600">Your account requires a password update before continuing.</p>
  <form class="space-y-3" hx-post="/api/auth/change-password" hx-target="#change-password-result" hx-swap="innerHTML">
    <input class="w-full border rounded px-3 py-2" type="password" name="new_password" placeholder="new password (min 12 chars)" minlength="12" required />
    <button class="w-full rounded bg-emerald-700 text-white py-2">Update Password</button>
  </form>
  <div id="change-password-result" class="text-sm"></div>
</section>
